server {
    listen 80;
    server_name _;
    root /var/www/html/public;

    # Livewire/Filament büyük cookie/header'ları için
    large_client_header_buffers 4 32k;

    # Response output buffer - büyük HTML yanıtların tam gönderilmesini sağlar
    output_buffers 8 256k;

    # Bağlantı timeout'ları
    send_timeout 300;
    keepalive_timeout 300;

    # Büyük dosya yüklemeleri için (Filament FileUpload)
    client_max_body_size 50M;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";

    index index.php index.html index.htm;
    charset utf-8;

    # Gzip sıkıştırma - büyük HTML yanıtlarını küçültür (QUIC uyumluluğu)
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_vary on;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        text/xml
        image/svg+xml;

    # HTTP/2 Error Fix (Cloudflare + PHP-FPM chunked issue)
    chunked_transfer_encoding off;
    proxy_http_version 1.1;

    # URL Yönlendiriciler
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    # PHP İşleyicisi
    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;

        # Filament/Livewire için devasa RAM buffer'ları (HTTP/2 Çözümü)
        fastcgi_buffering on;
        fastcgi_buffer_size 512k;
        fastcgi_buffers 16 512k;
        fastcgi_busy_buffers_size 1024k;
        fastcgi_temp_file_write_size 1024k;

        # Zaman aşımı - ağır sayfalar ve R2 bağlantısı için
        fastcgi_read_timeout 300;
        fastcgi_connect_timeout 60;
        fastcgi_send_timeout 300;
    }

    # Gizli dosyalara (Örn: .env) erişimi engelle
    location ~ /\.(?!well-known).* {
        deny all;
    }
}
