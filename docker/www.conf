; === DodoHaber PHP-FPM Pool Ayarları ===

[www]
user = www-data
group = www-data

listen = 127.0.0.1:9000

pm = dynamic
pm.max_children = 10
pm.start_servers = 3
pm.min_spare_servers = 2
pm.max_spare_servers = 5
pm.max_requests = 500

; Request termination timeout (saniye)
; Bu süre aşılırsa worker yeniden başlar
request_terminate_timeout = 300

; PHP-FPM output buffer boyutu
; Varsayılan çok küçük, Filament sayfaları için artırılmalı
output_buffering = 65536

; Clear environment variables
clear_env = no
