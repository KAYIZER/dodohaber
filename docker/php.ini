; === DodoHaber PHP Ayarları ===
; Filament/Livewire ağır sayfalarının düzgün render edilmesi için

; Bellek limiti (Filament için minimum 256M)
memory_limit = 256M

; Output buffering - büyük HTML yanıtlarının tam olarak gönderilmesini sağlar
output_buffering = 65536

; Dosya yükleme limitleri
upload_max_filesize = 50M
post_max_size = 50M

; Max execution time (R2 bağlantı gecikmeleri dahil)
max_execution_time = 120

; Max input vars (Filament formları çok fazla input alanı içerir)
max_input_vars = 5000

; Zlib output compression - nginx gzip ile çakışmasın
zlib.output_compression = Off

; Realpath cache (performans)
realpath_cache_size = 4096k
realpath_cache_ttl = 600

; OPcache (performans)
opcache.enable = 1
opcache.memory_consumption = 128
opcache.max_accelerated_files = 10000
opcache.validate_timestamps = 0
